listen = "127.0.0.1:1080"

[auth]
method = "password"        # "none" | "password"
[[auth.users]]
username = "alice"
password = "secret"

[timeouts]
handshake_ms = 10000       # deadline for greeting + auth + request (anti-slowloris)
connect_ms = 10000         # upstream dial + DNS resolution budget
tcp_idle_ms = 300000       # relay idle timeout (both directions idle)
udp_idle_ms = 60000        # UDP association idle timeout

[limits]
max_connections = 1024     # optional: cap on concurrent connections, enforced at
                           # accept time (half-open handshakes count too)
# max_per_ip = 64          # optional: cap on concurrent connections per source IP
udp_max_targets = 1024     # distinct targets tracked per UDP association
# udp_rate_pps = 5000      # optional: outbound datagrams/sec per association

[udp]
# Bind each UDP association's relay socket inside an inclusive port range instead
# of an OS-assigned ephemeral port, so a firewall/NAT only needs that range open.
# Size the range >= expected concurrent UDP associations (each binds its own
# socket); "40000-40000" is a single port and serializes UDP. When the range is
# exhausted, UDP ASSOCIATE replies with a general failure (0x01).
# port_range = "40000-40100"
#
# Advertised BND.ADDR (IP only) returned in UDP ASSOCIATE replies. By default the
# server advertises the server-side IP the client's TCP control connection arrived
# on (the control socket's local address).
# Override it when that IP is not client-reachable (behind NAT, or Docker with
# bridge networking): set the public/forwarded IP clients will use. The advertised
# PORT is always the real bound port, so any NAT/forward must be port-preserving
# (1:1). A port in "ip:port" form is ignored.
# advertise = "203.0.113.42"

# Egress policy guards against SSRF / open-relay abuse. Secure by default: all
# blocked. Set a class to false to allow it (e.g. an internal LAN proxy).
[egress]
block_loopback = true      # 127.0.0.0/8, ::1
block_link_local = true    # 169.254.0.0/16 (cloud metadata), fe80::/10
block_private = true       # 10/8, 172.16/12, 192.168/16, fc00::/7
