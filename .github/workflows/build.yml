name: build

# Build release artifacts for a broad set of targets. Triggered by pushing a
# version tag (e.g. v1.2.3) and can also be run manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux (musl, fully static — also runs on glibc distros) ----
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, cross: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, cross: true }
          # Temporarily disabled — re-enable when these platforms are needed.
          # - { target: armv7-unknown-linux-musleabihf, os: ubuntu-latest, cross: true }
          # ---- macOS ----
          # - { target: x86_64-apple-darwin, os: macos-latest, cross: false }
          # - { target: aarch64-apple-darwin, os: macos-latest, cross: false }
          # ---- Windows ----
          # - { target: x86_64-pc-windows-msvc, os: windows-latest, cross: false }
          # - { target: aarch64-pc-windows-msvc, os: windows-latest, cross: false }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` provides Docker-based toolchains for the Linux cross targets
      # (aarch64 / armv7 / musl) so no host cross-linker setup is needed.
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin=next-socks5
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          staging="next-socks5-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$staging/"
          # Bundle the sample config and docs when present.
          cp config.example.toml "$staging/" 2>/dev/null || true
          cp README.md "$staging/" 2>/dev/null || true
          cp LICENSE "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-socks5-${{ matrix.target }}
          path: ${{ env.ASSET }}

      # On a tag push, attach the artifact to a GitHub Release.
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
