name: build

# Build release artifacts, publish a multi-arch Docker image to GHCR, and cut a
# GitHub Release. Triggered by pushing a version tag (e.g. v1.2.3); can also be
# run manually from the Actions tab (manual runs only build + upload artifacts —
# no image push, no release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege by default; jobs that need more opt in below.
permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux (musl, fully static — also runs on glibc distros) ----
          - { target: x86_64-unknown-linux-musl, os: blacksmith-4vcpu-ubuntu-2404, cross: true }
          - { target: aarch64-unknown-linux-musl, os: blacksmith-4vcpu-ubuntu-2404, cross: true }
          # Temporarily disabled — re-enable when these platforms are needed.
          # - { target: armv7-unknown-linux-musleabihf, os: ubuntu-latest, cross: true }
          # ---- macOS ----
          # - { target: x86_64-apple-darwin, os: macos-latest, cross: false }
          # - { target: aarch64-apple-darwin, os: macos-latest, cross: false }
          # ---- Windows ----
          # - { target: x86_64-pc-windows-msvc, os: windows-latest, cross: false }
          # - { target: aarch64-pc-windows-msvc, os: windows-latest, cross: false }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` provides Docker-based toolchains for the Linux cross targets
      # (aarch64 / armv7 / musl) so no host cross-linker setup is needed.
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin=next-socks5
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          staging="next-socks5-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$staging/"
          # Bundle the sample config and docs when present.
          cp config.example.toml "$staging/" 2>/dev/null || true
          cp README.md "$staging/" 2>/dev/null || true
          cp LICENSE "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-socks5-${{ matrix.target }}
          path: ${{ env.ASSET }}

  docker:
    name: docker image (ghcr)
    needs: build
    # Only publish images on a tag push, reusing the binaries from `build`.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Lay out the prebuilt binaries under binaries/<docker-arch>/ so the
      # Dockerfile's `COPY binaries/${TARGETARCH}/...` picks the right one.
      - name: Arrange binaries by docker arch
        run: |
          set -euo pipefail
          mkdir -p binaries/amd64 binaries/arm64
          x="next-socks5-x86_64-unknown-linux-musl"
          a="next-socks5-aarch64-unknown-linux-musl"
          tar xzf "artifacts/${x}/${x}.tar.gz" -C /tmp
          tar xzf "artifacts/${a}/${a}.tar.gz" -C /tmp
          cp "/tmp/${x}/next-socks5" binaries/amd64/next-socks5
          cp "/tmp/${a}/next-socks5" binaries/arm64/next-socks5
          chmod +x binaries/amd64/next-socks5 binaries/arm64/next-socks5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Maintain the tag's version (e.g. 1.2.3) plus a moving `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: github release
    needs: build
    # Only cut a release on a tag push, attaching the binaries from `build`.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Pull the section for this tag's version out of CHANGELOG.md and use it as
      # the release body. The tag looks like v0.3.0; the matching heading is
      # `## [0.3.0]`. Falls back to a generic line if no section is found.
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            BEGIN { gsub(/\./, "\\.", ver); hdr = "^## \\[" ver "\\]" }
            /^## / { if (inblk) exit; inblk = ($0 ~ hdr); next }
            inblk { print }
          ' CHANGELOG.md | sed '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${version}." > RELEASE_NOTES.md
          fi
          echo "----- release notes for ${version} -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          body_path: RELEASE_NOTES.md
